name = "aceai-studio"
main = "worker.js"
compatibility_date = "2024-09-01"

[vars]
BRAND_NAME = "ACEAI"
# A dónde se redirige tras hacer clic en el magic-link (la URL del panel).
APP_URL = "https://REEMPLAZAR-con-tu-dominio-del-panel"
# SameSite de la cookie de sesión: "Lax" si el panel y el worker comparten
# dominio (recomendado); "None" solo si están en dominios distintos.
COOKIE_SAMESITE = "Lax"
# Remitente de los correos del magic-link.
EMAIL_FROM = "ACEAI <hola@aceaionlinemarketing.com>"

# ── Base de datos D1 (contenidos del dashboard + créditos) ───────────────────
# Crea la base:   npx wrangler d1 create aceai
# Copia el database_id que imprime y pégalo abajo. Luego:
#   npx wrangler d1 execute aceai --file=./schema.sql   (crea la tabla)
#   npx wrangler d1 execute aceai --file=./seed.sql     (siembra las 20 secciones)
[[d1_databases]]
binding = "DB"
database_name = "aceai"
database_id = "REEMPLAZAR_CON_TU_DATABASE_ID"

# ── Almacenamiento R2 (archivos subidos desde /admin: libro, app, cursos) ────
# Crea el bucket:   npx wrangler r2 bucket create aceai-files
[[r2_buckets]]
binding = "FILES"
bucket_name = "aceai-files"

# ── Secretos (NO van aquí; se cargan con `wrangler secret put NOMBRE`):
#   ANTHROPIC_API_KEY   (obligatorio para el Studio)
#   ALLOWED_ORIGIN      (recomendado: la URL del panel)
#   ADMIN_PASSWORD      (contraseña del gestor /admin)
#   AUTH_SECRET         (cadena larga aleatoria; firma sesiones y magic-links)
#
#   ACCESO POR MAGIC-LINK:
#   GHL_LOCATION_ID     id de la subcuenta (Location) en GHL — para buscar el contacto por correo
#   RESEND_API_KEY      API key de Resend para enviar el correo del enlace
#
#   NIVELES (seguridad real, leídos de GHL en cada petición):
#   GHL_PIT             token de integración privada de GHL (lee el contacto)
#   GHL_FIELD_P         id del campo personalizado nivel_p
#   GHL_FIELD_IA        id del campo personalizado nivel_ia
#   GHL_FIELD_PMF       id del campo personalizado acceso_pmf
#
#   Proveedores (opcionales): IMAGE_ENDPOINT, VIDEO_RENDER_URL, CAPTIONS_URL,
#   PUBLISH_URL, GHL_WEBHOOK_SECRET
