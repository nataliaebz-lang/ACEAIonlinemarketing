<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Mapamundi de Mujeres Emprendedoras · ACEAI</title>

<!-- Leaflet (CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<!-- Tipografías de marca -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --violet:#ED1B24;
    --violet-deep:#B3121A;
    --gold:#ffffff;
    --gold-2:#FFD2D5;
    --ink:#2A2024;
    --muted:#8A7E80;
    --paper:#FFFFFF;
    --paper-2:#FBF1F1;
    --line:rgba(237,27,36,.16);
    --shadow:0 14px 40px rgba(150,20,26,.18);
    --panel-w:380px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Jost',system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    overflow:hidden;
  }

  /* ====== LAYOUT ====== */
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}

  /* barra superior a todo el ancho */
  .topbar{flex:0 0 auto;z-index:1200;box-shadow:var(--shadow);position:relative;background:var(--paper)}

  /* contenido: mapa (izquierda) + directorio (derecha) */
  .content{flex:1;display:flex;min-height:0;position:relative}
  .map-wrap{flex:1;position:relative;order:1}
  #map{position:absolute;inset:0;background:#eef1f4}

  .panel{
    width:var(--panel-w);
    flex:0 0 var(--panel-w);
    background:var(--paper);
    border-left:1px solid var(--line);
    display:flex;flex-direction:column;
    position:relative;order:2;
    z-index:1000;
    box-shadow:-6px 0 24px rgba(70,32,44,.05);
  }

  /* ====== HEADER ====== */
  .head{
    padding:16px 22px 14px;
    background:radial-gradient(135% 130% at 90% 135%, rgba(255,255,255,.10), transparent 55%), var(--violet);
    color:#fff;position:relative;
  }
  .head::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold-2),transparent)}
  .eyebrow{
    font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold-2);font-weight:500;margin:0 0 6px;
  }
  .head h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;font-size:28px;line-height:1.04;margin:0;letter-spacing:.01em;
  }
  .head p{margin:8px 0 0;font-size:13.5px;font-weight:300;color:rgba(255,255,255,.82);max-width:30ch}

  .langs{position:absolute;top:18px;right:18px;display:flex;gap:2px;
    background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:3px}
  .langs button{
    border:0;background:transparent;color:rgba(255,255,255,.7);
    font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.06em;
    padding:5px 9px;border-radius:999px;cursor:pointer;transition:.18s;
  }
  .langs button.on{background:var(--gold);color:var(--violet-deep)}
  .langs button:hover{color:#fff}
  .langs button.on:hover{color:var(--violet-deep)}

  /* ====== STATS ====== */
  .stats{display:flex;border-bottom:1px solid var(--line)}
  .stat{flex:1;text-align:center;padding:15px 6px}
  .stat + .stat{border-left:1px solid var(--line)}
  .stat b{display:block;font-family:'Cormorant Garamond',serif;font-size:31px;font-weight:700;color:var(--violet);line-height:1}
  .stat span{display:block;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:5px}

  /* ====== CONTROLS ====== */
  .controls{padding:14px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;max-width:1100px}
  .controls .search{flex:1 1 260px;min-width:200px}
  .controls .country-select{margin-top:0;flex:0 0 240px;width:auto}
  .controls .chips-label{flex-basis:100%;margin:4px 0 0}
  .controls .chips{flex-basis:100%;margin-top:8px}
  .search{position:relative}
  .search input{
    width:100%;border:1px solid var(--line);border-radius:12px;
    background:var(--paper-2);padding:11px 14px 11px 38px;
    font-family:inherit;font-size:14px;color:var(--ink);transition:.18s;
  }
  .search input:focus{outline:none;border-color:var(--violet);background:#fff;box-shadow:0 0 0 3px rgba(237,27,36,.13)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}

  .country-select{
    width:100%;margin-top:9px;border:1px solid var(--line);border-radius:12px;
    background:var(--paper-2);padding:11px 36px 11px 14px;
    font-family:inherit;font-size:14px;color:var(--ink);cursor:pointer;
    -webkit-appearance:none;appearance:none;transition:.18s;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236E6580' stroke-width='2.5'><path d='m6 9 6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;
  }
  .country-select:focus{outline:none;border-color:var(--violet);background-color:#fff;box-shadow:0 0 0 3px rgba(237,27,36,.13)}

  .chips-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:16px 0 9px;font-weight:500}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--line);background:#fff;border-radius:999px;
    padding:6px 11px;font-family:inherit;font-size:12px;font-weight:500;color:var(--ink);
    cursor:pointer;transition:.16s;line-height:1;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#999);flex:0 0 8px}
  .chip .n{font-size:10.5px;color:var(--muted);font-weight:600}
  .chip:hover{border-color:var(--c,var(--violet))}
  .chip.on{background:var(--c,var(--violet));border-color:var(--c,var(--violet));color:#fff}
  .chip.on .n{color:rgba(255,255,255,.85)}
  .chip.all{font-weight:600}
  .chip.all .dot{background:linear-gradient(135deg,var(--violet),var(--gold))}
  .chip.all.on{background:var(--violet-deep);border-color:var(--violet-deep)}

  /* ====== LIST ====== */
  .list-head{padding:14px 18px 6px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .list{flex:1;overflow-y:auto;padding:0 12px 18px}
  .list::-webkit-scrollbar{width:8px}
  .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  .card{
    display:flex;gap:11px;align-items:flex-start;
    padding:11px 10px;border-radius:12px;cursor:pointer;transition:.14s;
    border:1px solid transparent;
  }
  .card:hover{background:var(--paper-2)}
  .card:focus-visible{outline:none;border-color:var(--violet);background:var(--paper-2)}
  .card .pin{width:11px;height:11px;border-radius:50%;background:var(--c,#999);margin-top:5px;flex:0 0 11px;
    box-shadow:0 0 0 3px color-mix(in srgb, var(--c,#999) 22%, transparent)}
  .card .body{min-width:0}
  .card .nm{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.05;margin:0}
  .card .co{font-size:12px;color:var(--muted);margin:2px 0 6px;display:flex;align-items:center;gap:5px}
  .card .tags{display:flex;flex-wrap:wrap;gap:4px}
  .card .bio-short{font-size:12px;line-height:1.45;color:#5b5470;margin:0 0 7px}
  .lead-line{font-size:11.5px;color:var(--violet);margin:0 0 7px}
  .lead-line b{font-weight:600}
  .tag{font-size:9.5px;letter-spacing:.04em;padding:3px 7px;border-radius:999px;
    background:color-mix(in srgb,var(--c,#999) 13%, white);color:color-mix(in srgb,var(--c,#999) 70%, black);font-weight:500}
  .legacy{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--violet);border:1px solid var(--violet);border-radius:999px;padding:1px 6px;margin-left:6px}

  .empty{padding:40px 22px;text-align:center;color:var(--muted);font-size:13px}

  /* ====== DETAIL ====== */
  .detail{position:absolute;inset:0;background:var(--paper);display:none;flex-direction:column;z-index:5}
  .detail.show{display:flex}
  .detail .top{padding:18px 18px 0}
  .back{display:inline-flex;align-items:center;gap:7px;border:0;background:transparent;color:var(--violet);
    font-family:inherit;font-weight:600;font-size:12.5px;letter-spacing:.04em;cursor:pointer;padding:6px 0}
  .back:hover{color:var(--violet-deep)}
  .detail .hero{padding:8px 22px 22px;border-bottom:1px solid var(--line)}
  .detail .flag{font-size:38px;line-height:1}
  .detail h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;line-height:1.02;margin:12px 0 4px}
  .detail .nat{font-size:13px;color:var(--muted);letter-spacing:.02em}
  .detail .tags{margin:14px 0 0}
  .detail .bio{padding:20px 22px;font-size:15px;line-height:1.6;color:#433b52}
  .detail .more{margin:4px 22px 22px;display:flex;flex-wrap:wrap;gap:8px}
  .detail .more a{display:inline-flex;align-items:center;gap:8px;text-decoration:none;
    color:var(--violet);font-weight:600;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:9px 14px;transition:.16s}
  .detail .more a:hover{border-color:var(--violet);background:var(--paper-2)}

  /* ====== MAP MARKERS ====== */
  .mk{display:block;width:15px;height:15px;border-radius:50%;background:var(--c,#999);
    border:2.5px solid #fff;cursor:pointer;
    box-shadow:0 3px 8px rgba(40,30,60,.32), 0 0 0 5px color-mix(in srgb,var(--c,#999) 16%, transparent);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s}
  .leaflet-marker-icon:hover .mk{transform:scale(1.4);
    box-shadow:0 5px 14px rgba(40,30,60,.42), 0 0 0 6px color-mix(in srgb,var(--c,#999) 26%, transparent)}
  .mk.sel{transform:scale(1.55);
    box-shadow:0 6px 16px rgba(40,30,60,.5), 0 0 0 7px color-mix(in srgb,var(--c,#999) 34%, transparent)}

  /* burbujas de cluster por país */
  .cl-wrap{background:none!important;border:none!important}
  .cl-bubble{display:flex;align-items:center;justify-content:center;border-radius:50%;
    font-family:'Jost',sans-serif;font-weight:600;color:#fff;font-size:13px;cursor:pointer;
    background:radial-gradient(120% 120% at 30% 25%, #F4565C, #ED1B24 60%, #B3121A);
    border:2.5px solid #fff;box-shadow:0 4px 16px rgba(150,20,26,.36);
    transition:transform .18s cubic-bezier(.34,1.4,.64,1), filter .18s}
  .cl-bubble:hover{filter:brightness(1.07);transform:scale(1.07)}
  .marker-cluster-spider-leg{stroke:var(--violet)!important;stroke-opacity:.5!important}
  .leaflet-popup-content-wrapper{border-radius:12px}
  .leaflet-container{font-family:'Jost',sans-serif;background:#eef1f4}

  /* ====== CONTROLES LEAFLET (estilo de marca) ====== */
  .leaflet-control-attribution{
    background:rgba(255,255,255,.8)!important;backdrop-filter:blur(5px);
    font-family:'Jost',sans-serif!important;font-size:10px!important;color:var(--muted)!important;
    padding:3px 9px!important;border-radius:9px 0 0 0;letter-spacing:.02em;
    box-shadow:0 1px 8px rgba(40,30,60,.08)}
  .leaflet-control-attribution a{color:var(--violet)!important;text-decoration:none}
  .leaflet-bar{border:0!important;border-radius:13px!important;overflow:hidden;
    box-shadow:0 4px 16px rgba(40,30,60,.16)!important}
  .leaflet-bar a{
    width:35px;height:35px;line-height:35px;color:var(--ink);background:#fff;
    border-bottom:1px solid var(--line)!important;font-size:18px;transition:.15s}
  .leaflet-bar a:hover{background:var(--paper-2);color:var(--violet)}
  .leaflet-bar a:last-child{border-bottom:0!important}

  /* ====== FOOTER CREDIT ====== */
  .credit{padding:11px 18px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-align:center}
  .credit b{color:var(--violet);font-weight:600;letter-spacing:.12em}

  /* ====== MOBILE TOGGLE ====== */
  .sheet-toggle{display:none}

  @media (max-width:820px){
    .content{flex-direction:column}
    .map-wrap{order:1;flex:0 0 42vh;min-height:42vh}
    .panel{
      order:2;width:100%;flex:1 1 auto;
      border-left:0;border-top:1px solid var(--line);
      box-shadow:none;
    }
    .controls{padding:10px 14px}
    .head{padding:13px 18px 11px}
    .head h1{font-size:22px}
    .head p{display:none}
    .langs{top:11px;right:14px}
    .credit{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* ====== BOTÓN PREMIOS ====== */
  .awards-btn{
    flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
    background:var(--violet);color:#fff;border:0;border-radius:12px;
    padding:11px 15px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.02em;
    cursor:pointer;transition:.18s;box-shadow:0 2px 10px rgba(150,20,26,.20);
  }
  .awards-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .flora-btn{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
    background:#2E8B57;color:#fff;border:0;border-radius:12px;
    padding:11px 15px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.02em;
    cursor:pointer;transition:.18s;box-shadow:0 2px 10px rgba(46,139,87,.25)}
  .flora-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .awards-overlay.flora .awards-head{background:radial-gradient(120% 120% at 100% 0%, rgba(255,255,255,.18), transparent 55%),linear-gradient(160deg,#2E8B57,#1d5e3a)}
  .flora-sub{grid-column:1/-1;margin:-4px 0 6px;font-size:12.5px;font-style:italic;color:var(--muted)}
  .modal-controls{display:flex;flex-direction:column;gap:9px;padding:12px 24px 4px;border-bottom:1px solid var(--line)}
  .modal-controls .country-select{flex:0 0 auto;max-width:300px;margin:0}
  .modal-chips{margin:0}
  .award-card.flash{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,183,5,.45);background:#fff}

  /* ====== APARTADO PREMIOS ====== */
  .awards-overlay{position:absolute;inset:0;z-index:1500;display:none;
    background:rgba(40,22,46,.55);backdrop-filter:blur(3px)}
  .awards-overlay.show{display:flex;align-items:stretch;justify-content:center}
  .awards-inner{background:var(--paper);width:100%;max-width:980px;margin:0 auto;
    display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .awards-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 24px;color:#fff;
    background:radial-gradient(120% 120% at 100% 0%, rgba(255,255,255,.18), transparent 55%),linear-gradient(160deg,var(--violet),var(--violet-deep))}
  .awards-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;margin:0}
  .awards-close{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:999px;
    padding:7px 13px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.18s}
  .awards-close:hover{background:rgba(255,255,255,.26)}
  .awards-intro{padding:16px 24px 4px;margin:0;font-size:13.5px;color:var(--muted);max-width:62ch}
  .awards-grid{padding:14px 24px 26px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .award-card{display:flex;gap:12px;border:1px solid var(--line);border-radius:14px;
    background:var(--paper-2);padding:14px 15px;transition:.16s}
  .award-card:hover{border-color:var(--gold);background:#fff}
  .award-trophy{font-size:20px;line-height:1;flex:0 0 auto}
  .award-body{min-width:0}
  .award-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.1;margin:0 0 3px;color:var(--ink)}
  .award-loc{font-size:11.5px;color:var(--muted);margin:0 0 7px}
  .award-bio{font-size:12.5px;line-height:1.5;color:#5b5470;margin:0}
  .award-win{font-size:12px;color:var(--violet);margin:8px 0 0}
  .award-win b{font-weight:600}
  .award-cat-title{grid-column:1/-1;display:flex;align-items:center;gap:9px;margin:20px 0 2px;padding-bottom:7px;
    font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--line)}
  .award-cat-title:first-child{margin-top:0}
  .award-cat-n{font-family:'Jost',sans-serif;font-size:11.5px;font-weight:500;color:#fff;background:var(--gold);border-radius:20px;padding:2px 10px;line-height:1.4}
  .award-name a{color:inherit;text-decoration:none;border-bottom:1px solid var(--gold);transition:color .15s}
  .award-name a:hover{color:var(--gold)}
  .brand-logo{height:64px;width:auto;display:block;margin:2px 0 10px}
</style>
</head>
<body>
<div class="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">

    <header class="head">
      <div class="langs" role="group" aria-label="Idioma">
        <button data-lang="es" class="on">ES</button>
        <button data-lang="en">EN</button>

  {name:"Brenda Milner", country:"ca", cats:["neurociencias","ciencia"], lat:45.5, lng:-73.58, bio:{es:"Pionera canadiense considerada la madre de la neuropsicología, por su estudio revolucionario de la memoria humana.",en:"Canadian pioneer considered the mother of neuropsychology, for her revolutionary study of human memory.",pt:"Pioneira canadense considerada a mãe da neuropsicologia, por seu estudo revolucionário da memória humana."}},

  {name:"Lisa Feldman Barrett", country:"us", cats:["neurociencias"], lat:42.34, lng:-71.09, bio:{es:"Una de las neurocientíficas más influyentes del siglo XXI. Demostró que el cerebro no detecta las emociones, las construye ('cerebro predictivo'); autora de 'How Emotions Are Made'.",en:"One of the most influential neuroscientists of the 21st century. She showed the brain does not detect emotions, it constructs them ('predictive brain'); author of 'How Emotions Are Made'.",pt:"Uma das neurocientistas mais influentes do século XXI. Mostrou que o cérebro não detecta as emoções, ele as constrói ('cérebro preditivo'); autora de 'How Emotions Are Made'."}},
  {name:"Tali Sharot", country:"il", cats:["neurociencias"], lat:32.08, lng:34.78, bio:{es:"Israelí experta en la toma de decisiones, el sesgo de optimismo y el comportamiento humano.",en:"Israeli expert in decision-making, the optimism bias and human behavior.",pt:"Israelense especialista em tomada de decisão, viés de otimismo e comportamento humano."}},
  {name:"Sarah-Jayne Blakemore", country:"gb", cats:["neurociencias"], lat:52.2, lng:0.13, web:"https://www.sjblakemore.com", bio:{es:"La mayor especialista mundial en el cerebro adolescente. Sus estudios sobre la maduración de la corteza prefrontal cambiaron la educación; autora de 'Inventing Ourselves'.",en:"The world's leading specialist on the adolescent brain. Her work on prefrontal-cortex maturation reshaped education; author of 'Inventing Ourselves'.",pt:"A maior especialista mundial no cérebro adolescente. Seus estudos sobre a maturação do córtex pré-frontal mudaram a educação; autora de 'Inventing Ourselves'."}},
  {name:"Eve Marder", country:"us", cats:["neurociencias","ciencia"], lat:42.37, lng:-71.26, bio:{es:"Referente en plasticidad neuronal y en cómo los circuitos cerebrales se mantienen estables y flexibles a la vez.",en:"A reference in neural plasticity and how brain circuits stay both stable and flexible.",pt:"Referência em plasticidade neuronal e em como os circuitos cerebrais se mantêm estáveis e flexíveis ao mesmo tempo."}},
  {name:"Nancy Kanwisher", country:"us", cats:["neurociencias","ciencia"], lat:42.36, lng:-71.09, bio:{es:"Investigadora del reconocimiento facial y de cómo el cerebro se organiza en regiones especializadas.",en:"Researcher of face recognition and how the brain organizes into specialized regions.",pt:"Pesquisadora do reconhecimento facial e de como o cérebro se organiza em regiões especializadas."}},
  {name:"Adele Diamond", country:"ca", cats:["neurociencias"], lat:49.26, lng:-123.25, bio:{es:"Pionera de la neurociencia del desarrollo: estudia las funciones ejecutivas y cómo se forman en la infancia.",en:"Pioneer of developmental cognitive neuroscience: she studies executive functions and how they form in childhood.",pt:"Pioneira da neurociência do desenvolvimento: estuda as funções executivas e como se formam na infância."}},
  {name:"Barbara Oakley", country:"us", cats:["neurociencias","desarrollo"], lat:42.67, lng:-83.21, bio:{es:"Referente en aprendizaje, memoria y neuroeducación. Su curso 'Learning How to Learn' es de los más seguidos del mundo.",en:"A reference in learning, memory and neuro-education. Her course 'Learning How to Learn' is among the most popular in the world.",pt:"Referência em aprendizagem, memória e neuroeducação. Seu curso 'Learning How to Learn' é um dos mais seguidos do mundo."}},
  {name:"Judith Grisel", country:"us", cats:["neurociencias"], lat:40.96, lng:-76.88, bio:{es:"Neurocientífica especializada en la neurobiología de la adicción; autora de 'Never Enough'.",en:"Neuroscientist specializing in the neurobiology of addiction; author of 'Never Enough'.",pt:"Neurocientista especializada na neurobiologia do vício; autora de 'Never Enough'."}},
  {name:"Wendy Suzuki", country:"us", cats:["neurociencias","wellness"], lat:40.73, lng:-73.99, web:"https://www.wendysuzuki.com", bio:{es:"Profesora de neurociencia en NYU. Demostró cómo el ejercicio físico mejora la memoria, la atención y el estado de ánimo; autora de 'Healthy Brain, Happy Life'.",en:"Neuroscience professor at NYU. She showed how physical exercise improves memory, attention and mood; author of 'Healthy Brain, Happy Life'.",pt:"Professora de neurociência na NYU. Mostrou como o exercício físico melhora a memória, a atenção e o humor; autora de 'Healthy Brain, Happy Life'."}},

  /* ====== Océanos ====== */
  {name:"Jane Lubchenco", country:"us", cats:["oceanos","ciencia"], lat:44.56, lng:-123.28, bio:{es:"Ecóloga marina, una de las científicas más influyentes en la gestión de océanos. Dirigió la NOAA y demostró que la ciencia debe guiar las políticas públicas.",en:"Marine ecologist, one of the most influential scientists in ocean management. She led NOAA and showed that science must guide public policy.",pt:"Ecóloga marinha, uma das cientistas mais influentes na gestão dos oceanos. Dirigiu a NOAA e mostrou que a ciência deve guiar as políticas públicas."}},
  {name:"Edith Widder", country:"us", cats:["oceanos","ciencia"], lat:27.46, lng:-80.32, web:"https://www.teamorca.org", bio:{es:"Oceanógrafa del océano profundo y experta en bioluminiscencia. Inventó tecnologías para observar la vida marina sin alterarla; dirige ORCA.",en:"Deep-sea oceanographer and bioluminescence expert. She invented tools to observe marine life without disturbing it; she leads ORCA.",pt:"Oceanógrafa do oceano profundo e especialista em bioluminescência. Inventou tecnologias para observar a vida marinha sem perturbá-la; dirige a ORCA."}},
  {name:"Nancy Knowlton", country:"us", cats:["oceanos","ciencia"], lat:38.89, lng:-77.03, bio:{es:"Bióloga marina referente en la conservación de los arrecifes de coral y en transmitir esperanza basada en ciencia.",en:"Marine biologist, a reference in coral-reef conservation and in sharing science-based hope.",pt:"Bióloga marinha referência na conservação dos recifes de coral e em transmitir esperança baseada na ciência."}},
  {name:"Heidi Veit", country:"us", cats:["oceanos"], lat:38.9, lng:-77.04, bio:{es:"Líder de organizaciones ambientales dedicada a la protección de los océanos.",en:"Leader of environmental organizations dedicated to ocean protection.",pt:"Líder de organizações ambientais dedicada à proteção dos oceanos."}},
  {name:"Lizzie Carr", country:"gb", cats:["oceanos","sostenibilidad"], lat:51.51, lng:-0.13, bio:{es:"Activista británica contra la contaminación por plásticos en ríos y océanos; fundadora de Planet Patrol.",en:"British activist against plastic pollution in rivers and oceans; founder of Planet Patrol.",pt:"Ativista britânica contra a poluição por plásticos em rios e oceanos; fundadora da Planet Patrol."}},
  {name:"Susan Rockefeller", country:"us", cats:["oceanos"], lat:40.73, lng:-73.99, bio:{es:"Documentalista y defensora de los océanos. Su trabajo educa y sensibiliza sobre el mar y el cambio climático.",en:"Filmmaker and ocean advocate. Her work educates and raises awareness about the sea and climate change.",pt:"Documentarista e defensora dos oceanos. Seu trabalho educa e conscientiza sobre o mar e as mudanças climáticas."}},
  {name:"Daniela Fernandez", country:"ec", cats:["oceanos","networking"], lat:-0.18, lng:-78.47, bio:{es:"Fundadora de la Sustainable Ocean Alliance. Impulsa el liderazgo juvenil y la diplomacia oceánica a escala internacional.",en:"Founder of the Sustainable Ocean Alliance. She drives youth leadership and ocean diplomacy on the international stage.",pt:"Fundadora da Sustainable Ocean Alliance. Impulsiona a liderança jovem e a diplomacia oceânica em escala internacional."}},
  {name:"Minna Epps", country:"ch", cats:["oceanos"], lat:46.41, lng:6.27, bio:{es:"Directora del equipo de océanos de la UICN. Lidera la conservación marina y la gestión de ecosistemas costeros a nivel global.",en:"Director of IUCN's ocean team. She leads marine conservation and coastal-ecosystem management worldwide.",pt:"Diretora da equipe de oceanos da UICN. Lidera a conservação marinha e a gestão de ecossistemas costeiros em escala global."}},
  {name:"Maria Damanaki", country:"gr", cats:["oceanos"], lat:37.98, lng:23.73, bio:{es:"Política griega y exComisaria europea de Pesca. Referente en gobernanza oceánica internacional y pesca sostenible.",en:"Greek politician and former EU Commissioner for Fisheries. A reference in international ocean governance and sustainable fishing.",pt:"Política grega e ex-Comissária europeia de Pesca. Referência em governança oceânica internacional e pesca sustentável."}},
  {name:"Jennifer Morris", country:"us", cats:["oceanos","empresarias"], lat:38.95, lng:-77.39, bio:{es:"Directora ejecutiva de The Nature Conservancy. Lidera a escala global la conservación de la naturaleza, incluidos los océanos.",en:"CEO of The Nature Conservancy. She leads nature conservation worldwide, including the oceans.",pt:"Diretora executiva da The Nature Conservancy. Lidera em escala global a conservação da natureza, incluindo os oceanos."}},
  {name:"Isabelle Autissier", country:"fr", cats:["oceanos"], lat:46.16, lng:-1.15, bio:{es:"Primera mujer en dar la vuelta al mundo navegando en solitario en regata. Exploradora y defensora de los océanos, presidió WWF Francia.",en:"First woman to sail solo around the world in a race. An explorer and ocean advocate, she chaired WWF France.",pt:"Primeira mulher a dar a volta ao mundo velejando sozinha em regata. Exploradora e defensora dos oceanos, presidiu a WWF França."}},

  {name:"Fani Hatjina", country:"gr", cats:["apicultura","ciencia"], lat:40.85, lng:25.87, bio:{es:"Investigadora griega referente en nutrición y salud de las colonias, con liderazgo internacional en investigación apícola.",en:"Greek researcher, a reference in colony nutrition and health, with international leadership in bee research.",pt:"Pesquisadora grega, referência em nutrição e saúde das colônias, com liderança internacional na pesquisa apícola."}},
  {name:"Deborah Delaney", country:"us", cats:["apicultura","ciencia"], lat:39.68, lng:-75.75, bio:{es:"Investigadora de la diversidad genética y la resiliencia de las colonias de abejas.",en:"Researcher of genetic diversity and resilience in bee colonies.",pt:"Pesquisadora da diversidade genética e da resiliência das colônias de abelhas."}},
  {name:"Sarah Red-Laird", country:"us", cats:["apicultura","regeneracion"], lat:42.19, lng:-122.7, web:"https://www.beegirl.org", bio:{es:"Apicultora y educadora, fundadora de Bee Girl Organization. Restaura hábitats de polinizadores y promueve una apicultura regenerativa.",en:"Beekeeper and educator, founder of Bee Girl Organization. She restores pollinator habitats and promotes regenerative beekeeping.",pt:"Apicultora e educadora, fundadora da Bee Girl Organization. Restaura habitats de polinizadores e promove uma apicultura regenerativa."}},
  {name:"Monika Shukla", country:"in", cats:["apicultura","empresarias","regeneracion"], lat:28.61, lng:77.21, bio:{es:"Cofundadora y CEO de Humble Bee (India). Impulsa la apicultura sostenible como herramienta de desarrollo rural y empoderamiento de mujeres.",en:"Co-founder and CEO of Humble Bee (India). She drives sustainable beekeeping as a tool for rural development and women's empowerment.",pt:"Cofundadora e CEO da Humble Bee (Índia). Impulsiona a apicultura sustentável como ferramenta de desenvolvimento rural e empoderamento de mulheres."}},

  {name:"Jennifer Berry", country:"us", cats:["apicultura","ciencia"], lat:33.95, lng:-83.38, bio:{es:"Investigadora aplicada y formadora de apicultores.",en:"Applied researcher and trainer of beekeepers.",pt:"Pesquisadora aplicada e formadora de apicultores."}},
  {name:"May Berenbaum", country:"us", cats:["apicultura","ciencia"], lat:40.11, lng:-88.23, bio:{es:"Referente en ecología de insectos y en la protección de los polinizadores.",en:"A reference in insect ecology and pollinator protection.",pt:"Referência em ecologia de insetos e na proteção dos polinizadores."}},
  {name:"Diana Sammataro", country:"us", cats:["apicultura","ciencia"], lat:32.22, lng:-110.97, bio:{es:"Experta en sanidad apícola y en el manejo ecológico de colmenas.",en:"Expert in bee health and ecological hive management.",pt:"Especialista em sanidade apícola e no manejo ecológico de colmeias."}},
  {name:"Martha Kelemen", country:"mx", cats:["apicultura","regeneracion"], lat:19.43, lng:-99.13, bio:{es:"Dedicada a la conservación de abejas nativas sin aguijón y a la educación comunitaria en México.",en:"Devoted to conserving native stingless bees and to community education in Mexico.",pt:"Dedicada à conservação de abelhas nativas sem ferrão e à educação comunitária no México."}},
  {name:"Menani Kaitoga", country:"fj", cats:["apicultura","regeneracion"], lat:-18.14, lng:178.44, bio:{es:"Promotora de la apicultura comunitaria y la conservación de la biodiversidad en Fiyi.",en:"Promoter of community beekeeping and biodiversity conservation in Fiji.",pt:"Promotora da apicultura comunitária e da conservação da biodiversidade em Fiji."}},
  {name:"Paula Carnell", country:"gb", cats:["apicultura","regeneracion"], lat:51.08, lng:-2.31, bio:{es:"Apicultora natural británica. Defiende métodos respetuosos con las abejas y la salud de las colmenas sin químicos.",en:"British natural beekeeper. She champions bee-respectful methods and chemical-free colony health.",pt:"Apicultora natural britânica. Defende métodos respeitosos com as abelhas e a saúde das colmeias sem químicos."}},
  {name:"Women for Bees · Oxapampa", country:"pe", cats:["apicultura","regeneracion","ddhh"], lat:-10.57, lng:-75.4, bio:{es:"Iniciativa de UNESCO y Guerlain con mujeres indígenas y rurales en la reserva Oxapampa-Asháninka-Yánesha: meliponicultura para conservar abejas nativas y la biodiversidad amazónica.",en:"A UNESCO and Guerlain initiative with Indigenous and rural women in the Oxapampa-Asháninka-Yánesha reserve: meliponiculture to conserve native bees and Amazonian biodiversity.",pt:"Iniciativa da UNESCO e da Guerlain com mulheres indígenas e rurais na reserva Oxapampa-Asháninka-Yánesha: meliponicultura para conservar abelhas nativas e a biodiversidade amazônica."}},
  {name:"Ysabel Calderón", country:"pe", cats:["apicultura","regeneracion"], lat:-6.7, lng:-79.91, bio:{es:"Protege abejas nativas sin aguijón para restaurar el bosque seco de Lambayeque. Ha reforestado más de 2.000 árboles y desarrolla agroturismo educativo (Ruta de la Miel).",en:"She protects native stingless bees to restore the dry forest of Lambayeque. She has reforested over 2,000 trees and runs educational agritourism (Ruta de la Miel).",pt:"Protege abelhas nativas sem ferrão para restaurar o bosque seco de Lambayeque. Já reflorestou mais de 2.000 árvores e desenvolve agroturismo educativo (Ruta de la Miel)."}},
  {name:"Red de Mujeres Abeja · Los Tuxtlas", country:"mx", cats:["apicultura","regeneracion","ddhh"], lat:18.45, lng:-95.1, bio:{es:"Mujeres rurales de Veracruz que crían abejas nativas sin aguijón como patrimonio biocultural: 78 mujeres y 196 nidos en cajas y ollas de barro.",en:"Rural women of Veracruz raising native stingless bees as biocultural heritage: 78 women and 196 nests in boxes and clay pots.",pt:"Mulheres rurais de Veracruz que criam abelhas nativas sem ferrão como patrimônio biocultural: 78 mulheres e 196 ninhos em caixas e potes de barro."}},
  {name:"Colmenas de Sororidad · Yucatán", country:"mx", cats:["apicultura","regeneracion","ddhh"], lat:20.97, lng:-89.62, bio:{es:"Mujeres mayas que trabajan con la abeja Melipona beecheii (con PNUD) para regenerar la selva maya y la autonomía económica femenina.",en:"Maya women working with the Melipona beecheii bee (with UNDP) to regenerate the Maya forest and women's economic autonomy.",pt:"Mulheres maias que trabalham com a abelha Melipona beecheii (com o PNUD) para regenerar a selva maia e a autonomia econômica feminina."}},
  {name:"Meliponicultoras de Paragominas", country:"br", cats:["apicultura","regeneracion"], lat:-2.97, lng:-47.35, bio:{es:"Mujeres capacitadas (FAO y Embrapa) en el manejo sostenible de abejas sin aguijón; Brasil alberga más de 250 especies conocidas.",en:"Women trained (FAO and Embrapa) in sustainable management of stingless bees; Brazil is home to over 250 known species.",pt:"Mulheres capacitadas (FAO e Embrapa) no manejo sustentável de abelhas sem ferrão; o Brasil abriga mais de 250 espécies conhecidas."}},
  {name:"Meliponicultoras del Chaco Boliviano", country:"bo", cats:["apicultura","regeneracion","ddhh"], lat:-19.0, lng:-63.0, bio:{es:"Mujeres indígenas y campesinas (con la Fundación PASOS) en el manejo racional de abejas nativas, con foco en su liderazgo y autonomía económica.",en:"Indigenous and peasant women (with the PASOS Foundation) in the rational management of native bees, focused on their leadership and economic autonomy.",pt:"Mulheres indígenas e camponesas (com a Fundação PASOS) no manejo racional de abelhas nativas, com foco em sua liderança e autonomia econômica."}},
  {name:"Silvia Godoy", country:"ar", cats:["apicultura","regeneracion","ddhh"], lat:-25.5, lng:-61.0, bio:{es:"Lidera la crianza de meliponas nativas en el Impenetrable Chaqueño con comunidades qom, como forma de resistencia frente a la deforestación.",en:"She leads the raising of native melipona bees in the Impenetrable Chaqueño with Qom communities, as a form of resistance to deforestation.",pt:"Lidera a criação de meliponas nativas no Impenetrável Chaquenho com comunidades qom, como forma de resistência ao desmatamento."}},
  {name:"Abejas nativas · Amazonía peruana", country:"pe", cats:["apicultura","regeneracion","ddhh"], lat:-4.5, lng:-73.5, bio:{es:"Comunidades kukama y asháninka, con investigadores, protegen nidos silvestres y defienden legalmente a las abejas sin aguijón frente a la deforestación.",en:"Kukama and Asháninka communities, with researchers, protect wild nests and legally defend stingless bees against deforestation.",pt:"Comunidades kukama e asháninka, com pesquisadores, protegem ninhos silvestres e defendem legalmente as abelhas sem ferrão contra o desmatamento."}},
  {name:"Meliponicultura en Casanare", country:"co", cats:["apicultura","regeneracion"], lat:5.34, lng:-72.4, bio:{es:"Agricultores locales y la Universidad Nacional identificaron más de 20 abejas nativas con potencial productivo y forman en cría de reinas y mercadeo.",en:"Local farmers and the National University identified over 20 native bees with productive potential and train in queen-rearing and marketing.",pt:"Agricultores locais e a Universidade Nacional identificaram mais de 20 abelhas nativas com potencial produtivo e formam em criação de rainhas e comercialização."}},
  {name:"Paola Campo", country:"co", cats:["apicultura","regeneracion"], lat:3.5, lng:-73.0, bio:{es:"Dirige la Reserva Yurumí, 800 hectáreas en el Meta dedicadas a la restauración ecológica y a la producción de miel con apicultura y meliponicultura.",en:"She runs the Yurumí Reserve, 800 hectares in Meta dedicated to ecological restoration and honey production with beekeeping and meliponiculture.",pt:"Dirige a Reserva Yurumí, 800 hectares no Meta dedicados à restauração ecológica e à produção de mel com apicultura e meliponicultura."}},

  /* ====== Ancestralidad y cosmovisiones ====== */
  {name:"Patricia Gualinga", country:"ec", cats:["ceremonia","ddhh"], lat:-1.73, lng:-77.48, bio:{es:"Lideresa kichwa de Sarayaku (Ecuador). Difunde el Kawsak Sacha (Selva Viviente), que entiende el bosque como un ser vivo con dimensión espiritual, cultural y ecológica.",en:"Kichwa leader from Sarayaku (Ecuador). She shares Kawsak Sacha (Living Forest), which understands the forest as a living being with spiritual, cultural and ecological dimensions.",pt:"Líder kichwa de Sarayaku (Equador). Difunde o Kawsak Sacha (Selva Viva), que entende a floresta como um ser vivo com dimensão espiritual, cultural e ecológica."}},
  {name:"Nina Gualinga", country:"ec", cats:["ceremonia","ddhh"], lat:-1.55, lng:-77.9, bio:{es:"Activista kichwa de la Amazonía ecuatoriana. Defiende los derechos indígenas y la justicia climática desde la juventud.",en:"Kichwa activist from the Ecuadorian Amazon. She defends Indigenous rights and climate justice from a youth perspective.",pt:"Ativista kichwa da Amazônia equatoriana. Defende os direitos indígenas e a justiça climática a partir da juventude."}},
  {name:"Ruth Buendía", country:"pe", cats:["ceremonia","ddhh"], lat:-11.0, lng:-74.3, bio:{es:"Lideresa asháninka del Perú, Premio Goldman. Defiende el territorio y la cultura ancestral de su pueblo frente a las grandes represas.",en:"Asháninka leader from Peru, Goldman Prize winner. She defends her people's territory and ancestral culture against large dams.",pt:"Líder asháninka do Peru, Prêmio Goldman. Defende o território e a cultura ancestral de seu povo frente às grandes barragens."}},
  {name:"Myrna Cunningham", country:"ni", cats:["ceremonia","ddhh"], lat:14.04, lng:-83.39, bio:{es:"Lideresa miskitu de Nicaragua, referente en salud intercultural y derechos de los pueblos indígenas.",en:"Miskitu leader from Nicaragua, a reference in intercultural health and Indigenous peoples' rights.",pt:"Líder miskitu da Nicarágua, referência em saúde intercultural e direitos dos povos indígenas."}},
  {name:"Lorena Cabnal", country:"gt", cats:["ceremonia","ddhh"], lat:14.25, lng:-90.3, bio:{es:"Feminista comunitaria maya xinka de Guatemala. Propone la sanación del 'territorio cuerpo' y el 'territorio tierra'.",en:"Maya-Xinka community feminist from Guatemala. She proposes the healing of the 'body territory' and the 'land territory'.",pt:"Feminista comunitária maya xinka da Guatemala. Propõe a cura do 'território corpo' e do 'território terra'."}},
  {name:"Joanna Macy", country:"us", cats:["ceremonia","desarrollo"], lat:37.87, lng:-122.27, bio:{es:"Autora y maestra estadounidense. Creó el 'Trabajo que Reconecta', que integra ecología profunda y prácticas para cultivar resiliencia y acción colectiva.",en:"American author and teacher. She created 'The Work That Reconnects', integrating deep ecology and practices to cultivate resilience and collective action.",pt:"Autora e mestra estadunidense. Criou o 'Trabalho que Reconecta', que integra ecologia profunda e práticas para cultivar resiliência e ação coletiva."}},
  {name:"Osprey Orielle Lake", country:"us", cats:["ceremonia","ddhh"], lat:38.0, lng:-122.5, bio:{es:"Fundadora de WECAN. Promueve el liderazgo femenino y los saberes ancestrales en defensa del clima y la Tierra.",en:"Founder of WECAN. She promotes women's leadership and ancestral knowledge in defense of the climate and the Earth.",pt:"Fundadora da WECAN. Promove a liderança feminina e os saberes ancestrais em defesa do clima e da Terra."}},
  {name:"Cristina Calderón", country:"cl", cats:["ceremonia","legado"], lat:-54.93, lng:-67.62, legacy:true, bio:{es:"Última hablante nativa de la lengua yagán (Chile). Guardiana de la memoria y la cultura de su pueblo.",en:"Last native speaker of the Yagán language (Chile). A guardian of her people's memory and culture.",pt:"Última falante nativa da língua yagán (Chile). Guardiã da memória e da cultura de seu povo."}},
  {name:"Mama Irene · linaje Q'ero", country:"pe", cats:["ceremonia"], lat:-13.5, lng:-71.0, bio:{es:"Guardiana de la cosmovisión andina del linaje Q'ero (Perú): el Ayni, la Pachamama y las ceremonias de ofrenda (despachos).",en:"Keeper of the Andean cosmovision of the Q'ero lineage (Peru): Ayni, Pachamama and the offering ceremonies (despachos).",pt:"Guardiã da cosmovisão andina da linhagem Q'ero (Peru): o Ayni, a Pachamama e as cerimônias de oferenda (despachos)."}},

  {name:"Kate Raworth", country:"gb", cats:["bioeconomia","sostenibilidad","speakers"], lat:51.7520, lng:-1.2577, web:"https://www.kateraworth.com", bio:{es:"Economista británica creadora de la 'Economía Dona' (Doughnut Economics): un modelo para cubrir las necesidades de todas las personas dentro de los límites ecológicos del planeta. Referente mundial de la economía regenerativa y distributiva.",en:"British economist, creator of 'Doughnut Economics': a model to meet everyone's needs within the planet's ecological limits. A world reference for regenerative and distributive economics.",pt:"Economista britânica, criadora da 'Economia Donut' (Doughnut Economics): um modelo para atender às necessidades de todas as pessoas dentro dos limites ecológicos do planeta. Referência mundial da economia regenerativa e distributiva."}},
  {name:"Hunter Lovins", country:"us", cats:["bioeconomia","regeneracion","sostenibilidad"], lat:40.1672, lng:-105.1019, bio:{es:"Economista y autora estadounidense, presidenta de Natural Capitalism Solutions. Pionera del 'capitalismo natural' y de la economía regenerativa, asesora a empresas, ciudades y gobiernos para prosperar dentro de los límites de la naturaleza.",en:"American economist and author, president of Natural Capitalism Solutions. A pioneer of 'natural capitalism' and regenerative economics, she advises companies, cities and governments to thrive within nature's limits.",pt:"Economista e autora estadunidense, presidente da Natural Capitalism Solutions. Pioneira do 'capitalismo natural' e da economia regenerativa, assessora empresas, cidades e governos para prosperar dentro dos limites da natureza."}},
  {name:"Daniela Ibarra-Howell", country:"us", cats:["biomimesis","regeneracion","agroecologia","empresarias"], lat:40.0150, lng:-105.2705, web:"https://savory.global", bio:{es:"Cofundadora y CEO del Savory Institute, de raíces argentinas. Lidera una red global de manejo holístico que regenera praderas y suelos mediante el pastoreo planificado, conectando ganadería, biodiversidad y comunidades.",en:"Co-founder and CEO of the Savory Institute, of Argentine roots. She leads a global holistic-management network that regenerates grasslands and soils through planned grazing, connecting livestock, biodiversity and communities.",pt:"Cofundadora e CEO do Savory Institute, de raízes argentinas. Lidera uma rede global de manejo holístico que regenera pastagens e solos por meio do pastoreio planejado, conectando pecuária, biodiversidade e comunidades."}},
  {name:"Vanessa Nakate", country:"ug", cats:["juventud","ddhh","sostenibilidad"], lat:0.3476, lng:32.5825, bio:{es:"Activista climática ugandesa, fundadora del Rise Up Movement y voz del Sur global en la justicia climática. Embajadora de Buena Voluntad de UNICEF, defiende que las comunidades más afectadas por la crisis sean también las más escuchadas.",en:"Ugandan climate activist, founder of the Rise Up Movement and a voice of the Global South in climate justice. A UNICEF Goodwill Ambassador, she argues that the communities most affected by the crisis should also be the most heard.",pt:"Ativista climática ugandense, fundadora do Rise Up Movement e voz do Sul global na justiça climática. Embaixadora da Boa Vontade do UNICEF, defende que as comunidades mais afetadas pela crise sejam também as mais ouvidas."}},
  {name:"Mya-Rose Craig", country:"gb", cats:["juventud","ddhh","ciencia"], lat:51.4545, lng:-2.5879, bio:{es:"Naturalista y ornitóloga británica-bangladesí conocida como 'Birdgirl'. Fundó Black2Nature para acercar la naturaleza a jóvenes de minorías étnicas y es una voz joven por la biodiversidad y la justicia ambiental.",en:"British-Bangladeshi naturalist and ornithologist known as 'Birdgirl'. She founded Black2Nature to bring nature to young people from ethnic minorities and is a young voice for biodiversity and environmental justice.",pt:"Naturalista e ornitóloga britânico-bengali conhecida como 'Birdgirl'. Fundou a Black2Nature para aproximar a natureza de jovens de minorias étnicas e é uma voz jovem pela biodiversidade e pela justiça ambiental."}},
  {name:"Victoria Tauli-Corpuz", country:"ph", cats:["ceremonia","ddhh"], lat:16.4023, lng:120.5960, bio:{es:"Lideresa kankana-ey igorot de Filipinas, fundadora de Tebtebba. Fue Relatora Especial de la ONU sobre los Derechos de los Pueblos Indígenas (2014 a 2020), referente mundial en derechos territoriales y saberes ancestrales.",en:"Kankana-ey Igorot leader from the Philippines, founder of Tebtebba. She served as UN Special Rapporteur on the Rights of Indigenous Peoples (2014 to 2020), a world reference on land rights and ancestral knowledge.",pt:"Líder kankana-ey igorot das Filipinas, fundadora da Tebtebba. Foi Relatora Especial da ONU sobre os Direitos dos Povos Indígenas (2014 a 2020), referência mundial em direitos territoriais e saberes ancestrais."}},
  {name:"Tarcila Rivera Zea", country:"pe", cats:["ceremonia","ddhh"], lat:-12.0464, lng:-77.0428, bio:{es:"Activista quechua del Perú, fundadora de Chirapaq, Centro de Culturas Indígenas. Lleva décadas defendiendo los derechos de las mujeres indígenas y sus saberes; ha integrado el Foro Permanente de la ONU para las Cuestiones Indígenas.",en:"Quechua activist from Peru, founder of Chirapaq, Center of Indigenous Cultures. For decades she has defended the rights of Indigenous women and their knowledge; she has been a member of the UN Permanent Forum on Indigenous Issues.",pt:"Ativista quéchua do Peru, fundadora da Chirapaq, Centro de Culturas Indígenas. Há décadas defende os direitos das mulheres indígenas e seus saberes; integrou o Fórum Permanente da ONU para as Questões Indígenas."}},
  {name:"Aleta Baun", country:"id", cats:["ceremonia","ddhh","regeneracion"], lat:-9.7000, lng:124.4000, bio:{es:"Conocida como 'Mama Aleta', lideresa del pueblo mollo en Timor (Indonesia). Organizó a cientos de mujeres en protestas pacíficas que detuvieron la minería de mármol en sus montañas sagradas. Recibió el Premio Goldman en 2013.",en:"Known as 'Mama Aleta', a leader of the Mollo people in Timor (Indonesia). She organised hundreds of women in peaceful protests that stopped marble mining in their sacred mountains. She received the Goldman Prize in 2013.",pt:"Conhecida como 'Mama Aleta', líder do povo mollo em Timor (Indonésia). Organizou centenas de mulheres em protestos pacíficos que detiveram a mineração de mármore em suas montanhas sagradas. Recebeu o Prêmio Goldman em 2013."}},
  {name:"Casey Camp-Horinek", country:"us", cats:["ceremonia","ddhh"], lat:36.7070, lng:-97.0856, bio:{es:"Anciana y guardiana ceremonial de la Nación Ponca (Oklahoma, EE.UU.). Embajadora ambiental de su pueblo, impulsó que los Ponca reconocieran los Derechos de la Naturaleza, uniendo espiritualidad, defensa del territorio y justicia climática.",en:"Elder and ceremonial keeper of the Ponca Nation (Oklahoma, USA). An environmental ambassador for her people, she helped the Ponca recognise the Rights of Nature, uniting spirituality, land defence and climate justice.",pt:"Anciã e guardiã cerimonial da Nação Ponca (Oklahoma, EUA). Embaixadora ambiental de seu povo, impulsionou o reconhecimento dos Direitos da Natureza pelos Ponca, unindo espiritualidade, defesa do território e justiça climática."}},
  {name:"Gloria Ushigua", country:"ec", cats:["ceremonia","ddhh"], lat:-1.8000, lng:-76.8000, bio:{es:"Lideresa del pueblo sápara de la Amazonía ecuatoriana, presidenta de la asociación de mujeres sápara Ashiñwaka. Defiende su territorio y la lengua y cosmovisión sápara, reconocidas por la UNESCO, frente a la extracción petrolera.",en:"Leader of the Sápara people of the Ecuadorian Amazon, president of the Sápara women's association Ashiñwaka. She defends her territory and the Sápara language and worldview, recognised by UNESCO, against oil extraction.",pt:"Líder do povo sápara da Amazônia equatoriana, presidenta da associação de mulheres sápara Ashiñwaka. Defende seu território e a língua e cosmovisão sápara, reconhecidas pela UNESCO, frente à extração petrolífera."}}

  {name:"Apimondia · World Beekeeping Awards", cat:"miel", web:"https://www.apimondia.org", loc:{es:"Congreso mundial itinerante",en:"Rotating world congress"}, bio:{es:"Premios de la Federación Mundial de Asociaciones de Apicultura, otorgados cada dos años en el Congreso de Apimondia (uno de los más antiguos del mundo). Durante décadas coronaron a la 'Mejor Miel del Mundo' por cata a ciegas; en 2022 (Estambul) el título fue para un apicultor de Grecia. En 2025 la miel se retiró como categoría por la dificultad de testar el fraude a tiempo, pero siguen premiando cera, hidromiel e innovación.",en:"Awards of the World Federation of Beekeeping Associations, held every two years at the Apimondia Congress (one of the oldest in the world). For decades they crowned the 'Best Honey in the World' by blind tasting; in 2022 (Istanbul) the title went to a beekeeper from Greece. In 2025 honey was withdrawn as a category due to the difficulty of testing for fraud in time, though wax, mead and innovation are still judged.",pt:"Prêmios da Federação Mundial das Associações de Apicultura, concedidos a cada dois anos no Congresso da Apimondia (um dos mais antigos do mundo). Por décadas coroaram o 'Melhor Mel do Mundo' por prova às cegas; em 2022 (Istambul) o título foi para um apicultor da Grécia. Em 2025 o mel foi retirado como categoria pela dificuldade de testar a fraude a tempo, mas cera, hidromel e inovação seguem premiados."}},
  {name:"UK International Honey Show", cat:"miel", web:"https://www.honeyshow.co.uk", loc:{es:"Londres, Reino Unido",en:"London, United Kingdom"}, win:"Dr. Valma Jessamy (Jessamine Eden)", bio:{es:"Uno de los concursos de miel más antiguos del mundo, celebrado cada año en Londres desde finales del siglo XIX. Reúne mieles, hidromieles y ceras de todo el planeta. En 2016, el apiario Jessamine Eden de Granada (Caribe), dirigido por la científica Valma Jessamy, ganó allí el primer premio a la mejor miel del mundo.",en:"One of the world's oldest honey competitions, held every year in London since the late 19th century. It gathers honeys, meads and waxes from across the planet. In 2016 the Jessamine Eden apiary of Grenada (Caribbean), led by scientist Valma Jessamy, won first prize there for the best honey in the world.",pt:"Um dos concursos de mel mais antigos do mundo, realizado todos os anos em Londres desde o fim do século XIX. Reúne méis, hidroméis e ceras de todo o planeta. Em 2016 o apiário Jessamine Eden de Granada (Caribe), dirigido pela cientista Valma Jessamy, ganhou ali o primeiro prêmio de melhor mel do mundo."}},
  {name:"Lush Spring Prize", cat:"regeneracion", web:"https://springprize.org", loc:{es:"Dorset, Reino Unido · global",en:"Dorset, United Kingdom · global"}, bio:{es:"Premio bienal (200.000 libras o más) a la regeneración ambiental y social, creado por Lush y Ethical Consumer en 2017. Premia proyectos que van más allá de la sostenibilidad: restauran ecosistemas y comunidades. Muchos son liderados por mujeres y de base comunitaria, e incluye un Premio al Saber y la Sabiduría Indígena. En 2025 repartió unas 250.000 libras entre 19 grupos del mundo.",en:"Biennial prize (£200,000+) for environmental and social regeneration, created by Lush and Ethical Consumer in 2017. It rewards projects that go beyond sustainability: restoring ecosystems and communities. Many are women-led and grassroots, and it includes an Indigenous Knowledge and Wisdom Award. In 2025 it shared around £250,000 among 19 groups worldwide.",pt:"Prêmio bienal (200.000 libras ou mais) para a regeneração ambiental e social, criado pela Lush e Ethical Consumer em 2017. Premia projetos que vão além da sustentabilidade: restauram ecossistemas e comunidades. Muitos são liderados por mulheres e de base comunitária, e inclui um Prêmio ao Saber e à Sabedoria Indígena. Em 2025 repartiu cerca de 250.000 libras entre 19 grupos do mundo."}},
  {name:"Goldman Environmental Prize", cat:"sostenibilidad", web:"https://www.goldmanprize.org", loc:{es:"San Francisco, EE.UU. · global",en:"San Francisco, USA · global"}, win:"Ruth Buendía · Berta Cáceres · Máxima Acuña", bio:{es:"Conocido como el 'Nobel Verde', cada año honra a personas de base que defienden el medioambiente, una por región del mundo. Varias mujeres de este mapa lo recibieron: Ruth Buendía (2014), Berta Cáceres (2015) y Máxima Acuña (2016), por su lucha por los ríos, la tierra y los pueblos indígenas.",en:"Known as the 'Green Nobel', each year it honours grassroots people defending the environment, one per world region. Several women on this map received it: Ruth Buendía (2014), Berta Cáceres (2015) and Máxima Acuña (2016), for their fight for rivers, land and Indigenous peoples.",pt:"Conhecido como o 'Nobel Verde', a cada ano homenageia pessoas de base que defendem o meio ambiente, uma por região do mundo. Várias mulheres deste mapa o receberam: Ruth Buendía (2014), Berta Cáceres (2015) e Máxima Acuña (2016), por sua luta pelos rios, a terra e os povos indígenas."}},

let lang = 'es';
let activeCats = new Set();   // vacío = todas
let query = '';
let activeCountry = '';        // '' = todos
let selected = null;
let awardsCat = '';      // '' = todas
let floraCircle = '';     // '' = todos
const markers = [];           // {entry, marker, el}
let map, cluster;

const norm = s => (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

function initMap(){
  map = L.map('map', {worldCopyJump:true, minZoom:2, maxZoom:8, zoomControl:true, attributionControl:true})
        .setView([22, -20], 2);
  map.attributionControl.setPrefix(false); // deja solo la fuente de datos (sin enlace "Leaflet" ni bandera)
  setTimeout(()=>map.invalidateSize(), 250);
  window.addEventListener('resize', ()=>map.invalidateSize());
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap, &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);

  cluster = L.markerClusterGroup({
    showCoverageOnHover:false,
    maxClusterRadius:48,
    spiderfyDistanceMultiplier:1.3,
    iconCreateFunction: c => {
      const n = c.getChildCount();
      const size = n < 10 ? 38 : n < 30 ? 46 : 54;
      return L.divIcon({
        html:`<div class="cl-bubble" style="width:${size}px;height:${size}px">${n}</div>`,
        className:'cl-wrap', iconSize:[size,size]
      });
    }
  });
  map.addLayer(cluster);

  PEOPLE.forEach((entry, i) => {
    const color = CATS[entry.cats[0]].color;
    const icon = L.divIcon({className:'', html:`<span class="mk" style="--c:${color}"></span>`,
                            iconSize:[20,20], iconAnchor:[10,10]});
    const m = L.marker([entry.lat, entry.lng], {icon, title:entry.name, riseOnHover:true});
    m.on('click', () => openDetail(i, false));
    markers.push({entry, marker:m, idx:i});
  });
}

function matches(entry){
  if(activeCountry && entry.country !== activeCountry) return false;
  const catOk = activeCats.size === 0 || entry.cats.some(c => activeCats.has(c));
  if(!catOk) return false;
  if(!query) return true;
  const q = norm(query);
  return norm(entry.name).includes(q) || norm(COUNTRIES[entry.country][lang]).includes(q);
}

function populateCountries(){
  const sel = document.getElementById('countrySelect');
  const counts = {};
  PEOPLE.forEach(p => counts[p.country] = (counts[p.country]||0) + 1);
  const list = Object.keys(counts).sort((a,b)=>COUNTRIES[a][lang].localeCompare(COUNTRIES[b][lang]));
  let html = `<option value="">${UI[lang].allCountries} (${PEOPLE.length})</option>`;
  list.forEach(k => {
    html += `<option value="${k}">${COUNTRIES[k][lang]} (${counts[k]})</option>`;
  });
  sel.innerHTML = html;
  sel.value = activeCountry;
}

function populateNames(){
  const sel = document.getElementById('nameSelect');
  if(!sel) return;
  const order = PEOPLE.map((e,i)=>({name:e.name,i})).sort((a,b)=>a.name.localeCompare(b.name));
  let html = `<option value="">${UI[lang].nameSelectPlaceholder} (${PEOPLE.length})</option>`;
  order.forEach(o => { html += `<option value="${o.i}">${PEOPLE[o.i].name}</option>`; });
  sel.innerHTML = html;
  sel.value = '';
}

function goToWoman(i){
  if(isNaN(i)) return;
  // limpiar filtros para garantizar que la persona elegida sea visible
  activeCats.clear();
  query = '';
  activeCountry = '';
  const s = document.getElementById('search'); if(s) s.value='';
  render();
  openDetail(i, true);
}

function render(){
  const t = UI[lang];

  // textos estáticos
  document.querySelectorAll('[data-i18n]').forEach(el=>{ if(t[el.dataset.i18n]!==undefined) el.textContent=t[el.dataset.i18n]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder=t[el.dataset.i18nPh]; });
  document.documentElement.lang = lang;
  populateCountries();
  populateNames();

  // chips
  const chipsBox = document.getElementById('chips');
  chipsBox.innerHTML='';
  const allChip = document.createElement('button');
  allChip.className='chip all'+(activeCats.size===0?' on':'');
  allChip.innerHTML=`<span class="dot"></span>${t.all}`;
  allChip.onclick=()=>{ activeCats.clear(); render(); };
  chipsBox.appendChild(allChip);

  Object.entries(CATS).forEach(([key,c])=>{
    const count = PEOPLE.filter(p=>p.cats.includes(key)).length;
    const b=document.createElement('button');
    b.className='chip'+(activeCats.has(key)?' on':'');
    b.style.setProperty('--c', c.color);
    b.innerHTML=`<span class="dot"></span>${c[lang]}<span class="n">${count}</span>`;
    b.onclick=()=>{ activeCats.has(key)?activeCats.delete(key):activeCats.add(key); render(); };
    chipsBox.appendChild(b);
  });

  // lista + marcadores
  const list=document.getElementById('list');
  list.innerHTML='';
  const visible = PEOPLE.map((e,i)=>({e,i})).filter(o=>matches(o.e));

  if(visible.length===0){
    list.innerHTML=`<div class="empty">${t.empty}</div>`;
  } else {
    visible.sort((a,b)=>a.e.name.localeCompare(b.e.name))
      .forEach(({e,i})=>{
        const color=CATS[e.cats[0]].color;
        const card=document.createElement('div');
        card.className='card'; card.tabIndex=0; card.setAttribute('role','button');
        card.style.setProperty('--c',color);
        const tags=e.cats.map(c=>`<span class="tag" style="--c:${CATS[c].color}">${CATS[c][lang]}</span>`).join('');
        card.innerHTML=`<span class="pin"></span><div class="body">
          <p class="nm">${e.name}</p>
          <p class="co">${COUNTRIES[e.country].f} ${COUNTRIES[e.country][lang]}${e.legacy?`<span class="legacy">${lang==='en'?'legacy':'legado'}</span>`:''}</p>
          <p class="bio-short">${e.bio[lang]}</p>
          ${e.lead?`<p class="lead-line">${lang==='en'?'Led by':lang==='pt'?'Liderado por':'Lidera'}: <b>${e.lead}</b></p>`:''}
          <div class="tags">${tags}</div></div>`;
        const act=()=>openDetail(i,true);
        card.onclick=act;
        card.onkeydown=ev=>{ if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();act();} };
        list.appendChild(card);
      });
  }

  // marcadores en el mapa (protegido: un fallo de Leaflet nunca debe vaciar el directorio)
  try{
    markers.forEach(mo=>{const el=mo.marker.getElement(); if(el){const s=el.querySelector('.mk'); if(s) s.classList.remove('sel');}});
    cluster.clearLayers();
    const layers = visible.map(o=>markers[o.i] && markers[o.i].marker).filter(Boolean);
    cluster.addLayers(layers);
  }catch(err){ console.error('Error actualizando marcadores:', err); }

  // stats (sobre lo visible)
  document.getElementById('stWomen').textContent = visible.length;
  document.getElementById('stCountries').textContent = new Set(visible.map(o=>o.e.country)).size;
  document.getElementById('stCats').textContent = Object.keys(CATS).length;

  // detalle abierto: refrescar idioma
  if(selected!==null) fillDetail(selected);

  renderAwards();
  renderFlora();
}

function renderFlora(){
  const t = UI[lang];
  const chipsBox = document.getElementById('floraChips');
  const totalMembers = FLORA_CIRCLES.reduce((acc,c)=>acc+c.members.length,0);
  if(chipsBox){
    chipsBox.innerHTML='';
    const all=document.createElement('button');
    all.className='chip all'+(floraCircle===''?' on':'');
    all.innerHTML=`<span class="dot"></span>${t.all}<span class="n">${totalMembers}</span>`;
    all.onclick=()=>{ floraCircle=''; renderFlora(); };
    chipsBox.appendChild(all);
    FLORA_CIRCLES.forEach(circ=>{
      const b=document.createElement('button');
      b.className='chip'+(floraCircle===circ.key?' on':'');
      b.style.setProperty('--c', circ.color||'#999');
      b.innerHTML=`<span class="dot"></span>${circ.emoji} ${circ.name[lang]}<span class="n">${circ.members.length}</span>`;
      b.onclick=()=>{ floraCircle=(floraCircle===circ.key?'':circ.key); renderFlora(); };
      chipsBox.appendChild(b);
    });
  }
  const flat=[];
  FLORA_CIRCLES.forEach(circ=>circ.members.forEach(m=>flat.push({name:m.name})));
  const sel=document.getElementById('floraNameSelect');
  if(sel){
    const order=flat.map((f,idx)=>({n:f.name,idx})).sort((x,y)=>x.n.localeCompare(y.n));
    sel.innerHTML=`<option value="">${t.floraSearch}</option>`+order.map(o=>`<option value="${o.idx}">${flat[o.idx].name}</option>`).join('');
    sel.value='';
  }
  const grid = document.getElementById('floraGrid');
  if(!grid) return;
  let html = '';
  let fi = 0;
  FLORA_CIRCLES.forEach(circ=>{
    const show = (!floraCircle || floraCircle===circ.key);
    if(show){
      html += `<h3 class="award-cat-title">${circ.emoji} ${circ.name[lang]} <span class="award-cat-n">${circ.members.length}</span></h3>`;
      if(circ.sub) html += `<p class="flora-sub">${circ.sub[lang]}</p>`;
    }
    circ.members.forEach(m=>{
      const id = fi++;
      if(!show) return;
      html += `
      <div class="award-card" id="fl-${id}">
        <div class="award-trophy">🌿</div>
        <div class="award-body">
          <p class="award-name">${m.web?`<a href="${m.web}" target="_blank" rel="noopener">${m.name}</a>`:m.name}</p>
          <p class="award-loc">${m.pais[lang]}${m.legacy?` <span class="legacy">${lang==='en'?'legacy':'legado'}</span>`:''}</p>
          <p class="award-bio">${m.note[lang]}</p>
        </div>
      </div>`;
    });
  });
  if(!floraCircle){
    html += `<h3 class="award-cat-title">🏛️ ${t.floraCentersTitle} <span class="award-cat-n">${FLORA_CENTERS.length}</span></h3>`;
    html += FLORA_CENTERS.map(c=>`
    <div class="award-card">
      <div class="award-trophy">🏛️</div>
      <div class="award-body">
        <p class="award-name">${c.web?`<a href="${c.web}" target="_blank" rel="noopener">${c.name}</a>`:c.name}</p>
        <p class="award-loc">${c.loc[lang==='en'?'en':'es']}</p>
        <p class="award-bio">${c.bio[lang]}</p>
      </div>
    </div>`).join('');
  }
  grid.innerHTML = html;
}

    all.innerHTML=`<span class="dot"></span>${t.all}<span class="n">${AWARDS.length}</span>`;
    all.onclick=()=>{ awardsCat=''; renderAwards(); };
    chipsBox.appendChild(all);
    AWARD_CAT_ORDER.forEach(k=>{
      const items=AWARDS.filter(a=>a.cat===k); if(!items.length) return;
      const c=AWARD_CATS[k];
      const b=document.createElement('button');
      b.className='chip'+(awardsCat===k?' on':'');
      b.style.setProperty('--c', c.color||'#999');
      b.innerHTML=`<span class="dot"></span>${c.emoji} ${c[lang]}<span class="n">${items.length}</span>`;
      b.onclick=()=>{ awardsCat=(awardsCat===k?'':k); renderAwards(); };
      chipsBox.appendChild(b);
    });
  }
  const sel=document.getElementById('awardsNameSelect');
  if(sel){
    const order=AWARDS.map((a,i)=>({n:a.name,i})).sort((x,y)=>x.n.localeCompare(y.n));
    sel.innerHTML=`<option value="">${t.awardsSearch}</option>`+order.map(o=>`<option value="${o.i}">${AWARDS[o.i].name}</option>`).join('');
    sel.value='';
  }
  const grid = document.getElementById('awardsGrid');
  let html = '';
  AWARD_CAT_ORDER.forEach(k=>{
    if(awardsCat && awardsCat!==k) return;
    const items = AWARDS.map((a,i)=>({a,i})).filter(o=>o.a.cat===k);
    if(!items.length) return;
    const c = AWARD_CATS[k];
    html += `<h3 class="award-cat-title">${c.emoji} ${c[lang]} <span class="award-cat-n">${items.length}</span></h3>`;
    html += items.map(({a,i})=>`
      <div class="award-card" id="aw-${i}">
        <div class="award-trophy">🏆</div>
        <div class="award-body">
          <p class="award-name">${a.web?`<a href="${a.web}" target="_blank" rel="noopener">${a.name}</a>`:a.name}</p>
          <p class="award-loc">${a.loc[lang==='en'?'en':'es']}</p>
          <p class="award-bio">${a.bio[lang]}</p>
          ${a.win?`<p class="award-win">${t.winner}: <b>${a.win}</b></p>`:''}
        </div>
      </div>`).join('');
  });
  grid.innerHTML = html;
}

function fillDetail(i){
  const e=PEOPLE[i], t=UI[lang], C=COUNTRIES[e.country];
  document.getElementById('dFlag').textContent=C.f;
  document.getElementById('dName').textContent=e.name;
  document.getElementById('dNat').innerHTML=C[lang]+(e.legacy?`<span class="legacy">${lang==='en'?'legacy':'legado'}</span>`:'')+(e.lead?`<div class="lead-line">${lang==='en'?'Led by':lang==='pt'?'Liderado por':'Lidera'}: <b>${e.lead}</b></div>`:'');
  document.getElementById('dBio').textContent=e.bio[lang];
  document.getElementById('dTags').innerHTML=e.cats.map(c=>`<span class="tag" style="--c:${CATS[c].color}">${CATS[c][lang]}</span>`).join('');
  document.getElementById('dMore').href='https://www.google.com/search?q='+encodeURIComponent(e.name);
  const dWeb=document.getElementById('dWeb');
  if(e.web){ dWeb.href=e.web; dWeb.style.display=''; } else { dWeb.style.display='none'; }
}

function clearHighlight(){
  markers.forEach(mo=>{const el=mo.marker.getElement(); if(el){const s=el.querySelector('.mk'); if(s) s.classList.remove('sel');}});
}
function highlight(i){
  const el=markers[i] && markers[i].marker.getElement();
  if(el){const s=el.querySelector('.mk'); if(s) s.classList.add('sel');}
}

function openDetail(i, fly){
  selected=i;
  fillDetail(i);
  document.getElementById('detail').classList.add('show');
  clearHighlight();
  const e=PEOPLE[i];
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(fly){
    if(window.innerWidth<=820) document.getElementById('panel').classList.add('open');
    cluster.zoomToShowLayer(markers[i].marker, ()=>{
      map.panTo([e.lat,e.lng], {animate:!reduce, duration:.5});
      highlight(i);
    });
  } else {
    highlight(i);
  }
}

function closeDetail(){
  selected=null;
  document.getElementById('detail').classList.remove('show');
  clearHighlight();
}

/* eventos */
document.querySelectorAll('.langs button').forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.lang; document.querySelectorAll('.langs button').forEach(x=>x.classList.toggle('on',x===b)); render(); };
});
document.getElementById('search').addEventListener('input', e=>{ query=e.target.value; render(); });
document.getElementById('countrySelect').addEventListener('change', e=>{
  activeCountry = e.target.value;
  render();
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(activeCountry){
    const pts = PEOPLE.filter(p=>p.country===activeCountry).map(p=>[p.lat,p.lng]);
    if(pts.length===1) map.setView(pts[0], 6, {animate:!reduce});
    else if(pts.length) map.fitBounds(L.latLngBounds(pts), {padding:[60,60], maxZoom:6, animate:!reduce});
    if(window.innerWidth<=820) document.getElementById('panel').classList.add('open');
  } else {
    map.setView([22,-20], 2, {animate:!reduce});
  }
});
document.getElementById('back').onclick=closeDetail;

const _nameSel=document.getElementById('nameSelect');
if(_nameSel) _nameSel.addEventListener('change', e=>{
  const v = e.target.value;
  e.target.value = '';
  if(v!=='') goToWoman(parseInt(v,10));
});

// bottom sheet (móvil)
const _st=document.getElementById('sheetToggle');
if(_st) _st.onclick=()=>document.getElementById('panel').classList.toggle('open');

// apartado de premios
const awardsBox=document.getElementById('awards');
function openAwards(){ awardsCat=''; renderAwards(); awardsBox.classList.add('show'); awardsBox.setAttribute('aria-hidden','false'); }
function closeAwards(){ awardsBox.classList.remove('show'); awardsBox.setAttribute('aria-hidden','true'); }
document.getElementById('awardsBtn').onclick=openAwards;
document.getElementById('awardsClose').onclick=closeAwards;
awardsBox.addEventListener('click', e=>{ if(e.target===awardsBox) closeAwards(); });

// apartado de flora
const floraBox=document.getElementById('flora');
function openFlora(){ floraCircle=''; renderFlora(); floraBox.classList.add('show'); floraBox.setAttribute('aria-hidden','false'); }
function closeFlora(){ floraBox.classList.remove('show'); floraBox.setAttribute('aria-hidden','true'); }
document.getElementById('floraBtn').onclick=openFlora;
document.getElementById('floraClose').onclick=closeFlora;
floraBox.addEventListener('click', e=>{ if(e.target===floraBox) closeFlora(); });
function awardsJump(i){ awardsCat=''; renderAwards(); requestAnimationFrame(()=>{ const el=document.getElementById('aw-'+i); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1600); } }); }
function floraJump(i){ floraCircle=''; renderFlora(); requestAnimationFrame(()=>{ const el=document.getElementById('fl-'+i); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1600); } }); }
const _awSel=document.getElementById('awardsNameSelect');
if(_awSel) _awSel.addEventListener('change', e=>{ const v=e.target.value; e.target.value=''; if(v!=='') awardsJump(parseInt(v,10)); });
const _flSel=document.getElementById('floraNameSelect');
if(_flSel) _flSel.addEventListener('change', e=>{ const v=e.target.value; e.target.value=''; if(v!=='') floraJump(parseInt(v,10)); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFlora(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAwards(); });

/* arranque */
initMap();
render();
</script>
