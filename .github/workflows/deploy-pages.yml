name: Deploy demo to GitHub Pages

on:
  push:
    branches: [claude/dashboard-recreation-jwexhd]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build dashboard demo (single file)
        run: npm run build:demo

      - name: Assemble site (dashboard demo + portal)
        run: |
          mkdir -p _site/portal
          cp dist-demo/dashboard-demo.html _site/index.html
          cp portal/index.html _site/portal/index.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
