        .animate-bounce {
            animation: bounce 2s infinite;
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 53%, 80%, 100% {
                transform: translateY(0);
            }
            40%, 43% {
                transform: translateY(-8px);
            }
            70% {
                transform: translateY(-4px);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }

        function handleSubmit() {
            if (!formData.nombre || !formData.apellido || !formData.anoNacimiento ||
                !formData.sexo || !formData.email || !formData.pais) {
                alert('Por favor completa todos los campos');
                return;
            }
            const hilo = findHiloByYear(formData.anoNacimiento);
            console.log('Arquetipo encontrado:', hilo);
            if (hilo) {
                userHilo = hilo;
                currentPage = 'result';
                render();
            } else {
                alert('Error: No se pudo calcular el arquetipo. Intenta con otro año.');
            }
        }

        function setWantsReport(wants) {
            wantsReport = wants;
            
            // Enviar a Make inmediatamente cuando se elige
            sendToMake(formData, userHilo, wantsReport, rating);
            
            render();
        }

        function setRating(star) {
            rating = star;
            
            // Enviar a Make con el nuevo rating
            if (wantsReport !== null) {
                sendToMake(formData, userHilo, wantsReport, rating);
            }
            
            render();
        }

        function resetForm() {
            currentPage = 'form';
            currentStep = 1;
            formData = { nombre: '', apellido: '', anoNacimiento: '', sexo: '', email: '', pais: '', privacyConsent: false };
            userHilo = null;
            rating = 0;
            wantsReport = null;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            
            if (currentPage === 'form') {
                app.innerHTML = renderForm();
                setTimeout(() => { validateStep(); }, 0);
                
            } else if (currentPage === 'result') {
                app.innerHTML = renderResult();
            }
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function validateStep() {
            const btn = document.getElementById('nextBtn');
            if (!btn) return;
            let valid = false;
            if (currentStep === 1) {
                valid = formData.nombre.trim().length > 0 && formData.apellido.trim().length > 0;
            } else if (currentStep === 2) {
                const y = parseInt(formData.anoNacimiento);
                valid = y >= 1900 && y <= 2024;
            } else if (currentStep === 3) {
                valid = isValidEmail(formData.email) && formData.pais.trim().length > 0;
                const emailInput = document.getElementById('email');
                if (emailInput && formData.email && !isValidEmail(formData.email)) {
                    emailInput.style.borderColor = '#ef4444';
                    emailInput.style.backgroundColor = '#fef2f2';
                } else if (emailInput) {
                    emailInput.style.borderColor = '';
                    emailInput.style.backgroundColor = '';
                }
            } else if (currentStep === 4) {
                valid = formData.sexo !== '' && formData.privacyConsent === true;
            }
            btn.disabled = !valid;
        }

        function validateForm() { validateStep(); }

        // INICIALIZAR APLICACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

        // Para debug - probar con diferentes años
        function testYears() {
            console.log('=== Test de años ===');
            [1985, 1990, 1995, 2000, 2005].forEach(year => {
                const hilo = findHiloByYear(year);
                console.log(`Año ${year}: Arquetipo ${hilo ? hilo.numero : 'ERROR'} - ${hilo ? hilo.nombre.es : 'No encontrado'}`);
            });
        }

        // Ejecutar test al cargar (puedes comentar esta línea en producción)
        // testYears();
    </script>
